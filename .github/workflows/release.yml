name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            arch: arm64
            runner: macos-14

          - target: x86_64-apple-darwin
            os: macos-latest
            arch: x64
            runner: macos-13

          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            arch: x64

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            arch: x64

    runs-on: ${{ matrix.runner || matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo rm -f /etc/apt/sources.list.d/google-chrome.list 2>/dev/null || true
          sudo apt-get update -qq 2>&1 | grep -v 'Failed to fetch' || true
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Build release
        run: cd src-tauri && cargo build --release --target ${{ matrix.target }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: TriggerX-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/triggerx
            src-tauri/target/${{ matrix.target }}/release/triggerx.exe
          if-no-files-found: ignore

  release:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Package
        run: |
          mkdir -p release
          for dir in TriggerX-*; do
            if [ -f "$dir/triggerx" ]; then
              cp "$dir/triggerx" "release/triggerx-${dir#TriggerX-}"
              chmod +x "release/triggerx-${dir#TriggerX-}"
            fi
            if [ -f "$dir/triggerx.exe" ]; then
              cp "$dir/triggerx.exe" "release/triggerx-${dir#TriggerX-}.exe"
            fi
          done
          ls -lh release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: TriggerX ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: release/*
