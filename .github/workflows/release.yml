# =============================================================================
# Build & Release — TriggerX
#
# Only builds when a tag v* is pushed. Produces native binaries/installers:
#   macOS   → .dmg (aarch64 + x86_64)
#   Windows → .exe (NSIS)
#   Linux   → .deb / .AppImage
# =============================================================================

name: Build & Release

on:
  push:
    tags: ["v*"]

env:
  APP_NAME: TriggerX

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── macOS ────────────────────────────────────────────────────────────────
  macos:
    strategy:
      matrix:
        include:
          - arch: aarch64
            runner: macos-14
          - arch: x86_64
            runner: macos-13
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Build DMG
        run: pnpm tauri build

      - name: Upload .dmg
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-macos-${{ matrix.arch }}
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: warn

  # ─── Windows ──────────────────────────────────────────────────────────────
  windows:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Build NSIS (.exe)
        run: pnpm tauri build --bundles nsis

      - name: Upload .exe
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-windows
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

  # ─── Linux ────────────────────────────────────────────────────────────────
  linux:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system deps
        run: |
          sudo rm -f /etc/apt/sources.list.d/google-chrome.list 2>/dev/null || true
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Build AppImage + deb
        run: pnpm tauri build --bundles deb,appimage

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-linux-deb
          path: src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: warn

      - name: Upload .AppImage
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-linux-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn

  # ─── Release ──────────────────────────────────────────────────────────────
  release:
    needs: [macos, windows, linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - uses: actions/download-artifact@v4
        with:
          pattern: ${{ env.APP_NAME }}-*
          merge-multiple: true

      - name: Extract changelog
        run: |
          awk -v ver="${GITHUB_REF_NAME#v}" '
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md > /tmp/release_body.md || echo "" > /tmp/release_body.md

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release_body.md
          files: |
            *.dmg
            *.exe
            *.deb
            *.AppImage
