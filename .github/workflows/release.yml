# =============================================================================
# Build & Release — TriggerX
#
# Trigger:
#   Push tag: v*
#
# Outputs:
#   macOS   -> .dmg (Apple Silicon)
#   Windows -> NSIS (.exe)
#   Linux   -> .deb / .rpm / .AppImage
# =============================================================================

name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  APP_NAME: TriggerX

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # macOS
  # ===========================================================================
  macos:
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build DMG
        run: pnpm tauri build

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-macos
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

  # ===========================================================================
  # Windows
  # ===========================================================================
  windows:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build NSIS
        run: pnpm tauri build --bundles nsis

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-windows
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  # ===========================================================================
  # Linux
  # ===========================================================================
  linux:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install system packages
        run: |
          sudo rm -f /etc/apt/sources.list.d/google-chrome.list || true
          sudo apt-get update

          sudo apt-get install -y \
            rpm \
            patchelf \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libappindicator3-dev \
            librsvg2-dev

      - uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Linux Packages
        run: pnpm tauri build --bundles deb,rpm,appimage

      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-linux-deb
          path: src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: error

      - name: Upload RPM
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-linux-rpm
          path: src-tauri/target/release/bundle/rpm/*.rpm
          if-no-files-found: error

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-linux-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error

  # ===========================================================================
  # GitHub Release
  # ===========================================================================
  release:
    needs:
      - macos
      - windows
      - linux

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - uses: actions/download-artifact@v4
        with:
          pattern: ${{ env.APP_NAME }}-*
          merge-multiple: true

      - name: Generate release body
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md > release_body.md || true

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "${{ env.APP_NAME }} ${{ github.ref_name }}"
          body_path: release_body.md
          draft: false
          prerelease: false
          files: |
            *.dmg
            *.exe
            *.deb
            *.rpm
            *.AppImage
